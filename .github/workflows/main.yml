name: Java CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: permiss
        run: chmod +x gradlew
        
      - name: Build
        run: ./gradlew build

      - name: Archive artifacts (Build)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: Build
          path: |
             ./velocity/build/libs
